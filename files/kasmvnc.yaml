# User-level KasmVNC config override (~/.vnc/kasmvnc.yaml)
# Explicitly sets cert paths to ~/.vnc/self.pem (Kasm generates this on first boot)
# to avoid default snakeoil paths that don't exist in this image
desktop:
  resolution:
    width: 1920
    height: 1080
  allow_resize: true
network:
  ssl:
    pem_certificate: ${HOME}/.vnc/self.pem
    pem_key: ${HOME}/.vnc/self.pem
encoding:
  max_frame_rate: 30
runtime_configuration:
  allow_client_to_override_kasm_server_settings: true