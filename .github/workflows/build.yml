name: Build VRCX Docker Image

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild even if version unchanged"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest VRCX release tag
        id: vrcx
        run: |
          LATEST=$(curl -fsSL "https://api.github.com/repos/vrcx-team/VRCX/releases/latest" | jq -r '.tag_name')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Failed to fetch VRCX release"
            exit 1
          fi
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest VRCX: $LATEST"

      - name: Lowercase image name
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Check if tag exists in GHCR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.vrcx.outputs.version }}"
          IMAGE="${{ steps.img.outputs.name }}"
          FORCE="${{ github.event.inputs.force_rebuild }}"

          if [ "$FORCE" = "true" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Force rebuild requested"
            exit 0
          fi

          # Anonymous read for public packages, fallback to authenticated check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://ghcr.io/v2/${IMAGE}/manifests/${TAG}")

          if [ "$STATUS" = "200" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists in GHCR (HTTP 200)"
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG not in GHCR (HTTP $STATUS), build needed"
          fi

      - name: Free up disk space
        if: steps.check.outputs.needed == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Set up Docker Buildx
        if: steps.check.outputs.needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VRCX_REF=${{ steps.vrcx.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ steps.vrcx.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
