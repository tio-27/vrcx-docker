services:
  vrcx:
    image: ghcr.io/YOUR_GITHUB_USERNAME/vrcx-docker:latest
    container_name: vrcx
    hostname: vrcx
    restart: unless-stopped
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - TITLE=VRCX
      # Auth deaktiviert (LAN-only) - PASSWORD nicht setzen
      # - CUSTOM_USER=admin
      # - PASSWORD=changeme
      # Resolution Override (optional, default ist client-resizing)
      # - SELKIES_MANUAL_WIDTH=1920
      # - SELKIES_MANUAL_HEIGHT=1080
    ports:
      - "3000:3000"   # HTTP - kein Cert-Theater mehr
      # - "3001:3001" # HTTPS, brauchen wir nicht
    volumes:
      - /mnt/nvme/docker/vrcx:/config
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/3000' || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 60s
