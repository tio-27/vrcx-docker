services:
  vrcx:
    image: ghcr.io/tio-27/vrcx-docker:latest
    container_name: vrcx
    hostname: vrcx
    restart: unless-stopped
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - TITLE=VRCX
      - NO_DECOR=true
      # Selkies built-in watchdog - restarts VRCX if it exits
      - RESTART_APP=true
      # Single-app hardening: disables sudo/terminals/file-transfer in UI
      - HARDEN_DESKTOP=true
      # Clamp virtual display from default 16k - saves RAM/bandwidth
      - MAX_RES=1920x1080
      # LAN-only, no auth. To enable auth set BOTH:
      # - CUSTOM_USER=admin
      # - PASSWORD=changeme
      # Lock resolution (optional - browser cannot resize when set):
      # - SELKIES_MANUAL_WIDTH=1920
      # - SELKIES_MANUAL_HEIGHT=1080
    ports:
      - "3000:3000"  # HTTP (only works for localhost - browsers block WebRTC over HTTP from remote IPs)
      - "3001:3001"  # HTTPS with self-signed cert (use this for LAN/remote access)
    volumes:
      - /path/to/vrcx:/config
    # Hardware-accelerated stream encoding via Intel iGPU (Quick Sync).
    # Reduces CPU load from ~20-30% to ~5% for Selkies WebRTC stream.
    # Find your render group GID on the host: `ls -ln /dev/dri/renderD128` (3rd column)
    # Image already includes intel-media-va-driver-non-free for full encode support.
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - "107"   # <-- replace with your host's render group GID
    # environment additionally needs:
    #   - DRI_NODE=/dev/dri/renderD128
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c ':> /dev/tcp/127.0.0.1/3001' || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 90s