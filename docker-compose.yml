services:
  vrcx:
    image: ghcr.io/YOUR_GITHUB_USERNAME/vrcx-docker:latest
    container_name: vrcx
    hostname: vrcx
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      - VNC_PW=password
      - TZ=Europe/Berlin
      # Auflösung overriden (Default im Image: 1920x1080)
      # - KASMVNC_DESKTOP_RESOLUTION_WIDTH=2560
      # - KASMVNC_DESKTOP_RESOLUTION_HEIGHT=1440
      # - KASMVNC_ENCODING_MAX_FRAME_RATE=60
    ports:
      - "6901:6901"
    volumes:
      - /mnt/nvme/docker/vrcx:/home/kasm-user/.config/VRCX
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6901' || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 60s
