services:
  vrcx:
    image: ghcr.io/tio-27/vrcx-docker:latest
    container_name: vrcx
    hostname: vrcx
    restart: unless-stopped
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      # Wayland mode + zero-copy encoding settings.
      # PIXELFLUX_WAYLAND=true is set as image default (in Dockerfile);
      # uncomment below only to force-disable: - PIXELFLUX_WAYLAND=false
      #
      # DRINODE/DRI_NODE = same render node = zero-copy dmabuf path.
      # Adjust if your host has multiple GPUs (e.g. /dev/dri/renderD129).
      - DRINODE=/dev/dri/renderD128
      - DRI_NODE=/dev/dri/renderD128
      # Selkies built-in watchdog
      - RESTART_APP=true
      # Single-app hardening: disables sudo/terminals/file-transfer
      - HARDEN_DESKTOP=true
      # LAN-only, no auth. To enable HTTP basic auth, set both:
      # - CUSTOM_USER=admin
      # - PASSWORD=changeme
      # Optional: lock to fixed resolution and hide the picker
      # - SELKIES_MANUAL_WIDTH=1920
      # - SELKIES_MANUAL_HEIGHT=1080
    ports:
      - "3000:3000"  # HTTP - localhost only (browsers block WebRTC over plain HTTP from remote)
      - "3001:3001"  # HTTPS w/ self-signed cert - use this for LAN/remote
    volumes:
      - /mnt/nvme/docker/vrcx:/config
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "107"   # render group GID on TrueNAS Scale - check: ls -ln /dev/dri/renderD128
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c ':> /dev/tcp/127.0.0.1/3001' || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 90s
