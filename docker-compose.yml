services:
  vrcx:
    image: ghcr.io/YOUR_GITHUB_USERNAME/vrcx-docker:latest
    container_name: vrcx
    hostname: vrcx
    restart: unless-stopped
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - TITLE=VRCX
      - NO_DECOR=true
      # Auth deaktiviert (LAN) - keine PASSWORD setzen
      # - CUSTOM_USER=admin
      # - PASSWORD=changeme
      # Resolution Override (optional)
      # - SELKIES_MANUAL_WIDTH=1920
      # - SELKIES_MANUAL_HEIGHT=1080
    ports:
      - "3000:3000"
    volumes:
      - /mnt/nvme/docker/vrcx:/config
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/3000' || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 60s
